apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  labels:
    app: cart
spec:
  replicas: 1
  
  selector:
    matchLabels:
      app: cart

  template:
    metadata:
      labels:
        app: cart
    spec:
      containers:
      - name: cart
        image: vaheeddockerhub/ecomm-cart:latest   # 🔥 your built image
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8002

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "300m"
            memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: cart
spec:
  selector:
    app: cart

  ports:
    - port: 80
      targetPort: 8002
      protocol: TCP

  type: ClusterIP
