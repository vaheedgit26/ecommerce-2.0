apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: vaheeddockerhub/ecomm-frontend:latest   # 🔥 your built image
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 80

        #envFrom:
        #  - configMapRef:
        #      name: cognito-cm-vars

        #env:
        #- name: API_BASE_URL
        #  value: "http://api.localdev.me/api"
        #- name: USER_POOL_ID
        #  value: "ap-south-1_xxx"
        #- name: CLIENT_ID
        #  value: "xxx"

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "300m"
            memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    app: frontend

  ports:
    - port: 80
      targetPort: 80

  type: ClusterIP
